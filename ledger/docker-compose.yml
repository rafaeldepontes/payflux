services:
  rabbitmq:
    image: "rabbitmq:3-management"
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=user
      - RABBITMQ_DEFAULT_PASS=pass
    ports:
      - "5672:5672"
      - "15672:15672"
    deploy:
      mode: replicated
      replicas: 1

  postgres:
    image: postgres:latest
    container_name: "postgres"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "postgres"
      POSTGRES_USER: "user"
      POSTGRES_PASSWORD: "pass"
    deploy:
      mode: replicated
      replicas: 1
    volumes:
      - postgres:/var/lib/postgresql/data

  redis-compose:
    image: redis
    command: redis-server
    container_name: redis
    deploy:
      mode: replicated
      replicas: 1
    ports:
      - "6379:6379"

  opentelemetry:
    image: otel/opentelemetry-collector-dev:latest
    ports:
      - "4317:4317"
      - "55680:55680"

  ledger-app:
    container_name: "ledger-app"
    build:
      context: ./
      dockerfile: Dockerfile
    image: ledger-app
    depends_on:
      - opentelemetry
      - rabbitmq
      - postgres
    deploy:
      mode: replicated
      replicas: 1
    env_file:
      - .env
    ports:
      - "8080:8080"

volumes:
  postgres:
