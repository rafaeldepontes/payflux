services:
  rabbitmq:
    image: "rabbitmq:3-management"
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=user
      - RABBITMQ_DEFAULT_PASS=pass
    ports:
      - "5672:5672"
      - "15672:15672"
    deploy:
      mode: replicated
      replicas: 1

  postgres:
    image: postgres:latest
    container_name: "postgres"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "postgres"
      POSTGRES_USER: "user"
      POSTGRES_PASSWORD: "pass"
    deploy:
      mode: replicated
      replicas: 1
    volumes:
      - postgres:/var/lib/postgresql/data

  golang-project:
    container_name: "my-project"
    build:
      context: ./
      dockerfile: Dockerfile
    image: golang-project
    depends_on:
      - postgres
      - rabbitmq
    deploy:
      mode: replicated
      replicas: 1
    env_file:
      - .env
    ports:
      - "8080:8080"

volumes:
  postgres:
