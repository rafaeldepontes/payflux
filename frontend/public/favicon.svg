<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="P Logo with Vertical Crossing Line Inside White Box">
<title>Clean Fintech P Logo with Vertical Line Inside White Box</title>

<rect width="200" height="200" rx="20" ry="20" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>

<defs>
    <linearGradient id="pGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#003F7E;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#006699;stop-opacity:1" />
    </linearGradient>
</defs>

<g transform="translate(60, 45) scale(0.8)">

    <path d="
          M 0 140
          L 0 0
          L 65 0
          C 105 0, 125 20, 125 52.5
          C 125 85, 105 105, 65 105
          L 30 105
          L 30 140
          Z
          M 30 25
          L 30 80
          L 65 80
          C 85 80, 95 70, 95 52.5
          C 95 35, 85 25, 65 25
          Z
          "
          fill="url(#pGradient)"/>

    <line x1="30" y1="-20" x2="30" y2="160"
          stroke="url(#pGradient)"
          stroke-width="12"
          stroke-linecap="round"/>

</g>
</svg>